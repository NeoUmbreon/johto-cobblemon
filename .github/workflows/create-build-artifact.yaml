name: Create build artifact

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - '.gitignore'


jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v6.2.0
      with:
        python-version: '3.x'
        pip-install: pandas
    - name: Process files
      run: python update_trainer_interactions.py
    - name: Install zip
      run: |
        sudo apt update
        sudo apt install zip
    - name: Compress datapack
      run: zip -r ./datapacks/CobblemonJohto.zip ./datapacks/CobblemonJohto
    - uses: actions/upload-artifact@v7.0.1
      with:
        name: johto-cobblemon
        path: |
          ./datapacks/CobblemonJohto.zip
          ./trainers/